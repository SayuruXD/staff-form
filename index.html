<!DOCTYPE html>
<html>
<head>
  <title>Staff Application</title>

  <style>
    body {
      background: linear-gradient(135deg, #1e1e1e, #2f2f2f);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      background: #2b2b2b;
      padding: 25px;
      width: 420px;
      border-radius: 12px;
      box-shadow: 0 8px 0 #111, 0 0 20px rgba(0,0,0,0.6);
      transform: perspective(800px) rotateX(2deg);
      position: relative;
      padding-bottom: 70px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #55ff55;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #1a1a1a;
      color: white;
      box-shadow: inset 0 3px 5px #000;
    }

    textarea {
      resize: none; /* FIXED weird resize */
    }

    input:focus, textarea:focus {
      border: 1px solid #55ff55;
    }

    .step {
      transition: all 0.3s ease;
    }

    .hidden {
      display: none;
    }

    /* BUTTONS */
    .nav-btn {
      position: absolute;
      bottom: 15px;
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .next-btn {
      right: 15px;
      background: #55ff55;
      box-shadow: 0 3px 0 #2a8f2a;
    }

    .back-btn {
      left: 15px;
      background: #555;
      box-shadow: 0 3px 0 #222;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
    }

    .nav-btn:active {
      transform: translateY(2px);
    }

    /* CURSOR */
    #cursor {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: rgba(85,255,85,0.7);
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px #55ff55;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div class="card">
<h2>🛡 Staff Application</h2>

<form id="appForm">

<div class="step" id="step1">
  <input type="text" id="name" placeholder="Minecraft Username" required>
  <input type="text" id="age" placeholder="Age" required>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step2">
  <textarea id="q1" placeholder="Why do you want to become staff?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step3">
  <textarea id="q2" placeholder="Do you have past admin experience? Explain." required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step4">
  <textarea id="q3" placeholder="How many hours per day or week can you dedicate?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step5">
  <textarea id="q4" placeholder="How would you handle disputes between staff members?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step6">
  <textarea id="q5" placeholder="How would you respond to a serious rule violation by a member?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step7">
  <textarea id="q6" placeholder="Are you familiar with Discord server management and bots?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step8">
  <textarea id="q7" placeholder="How do you ensure fairness and consistency as a leader?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step9">
  <textarea id="q8" placeholder="Anything else we should know about you?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

</form>
</div>

<div id="cursor"></div>

<script>
let currentStep = 1;
let submitted = false;

// NEXT
function nextStep() {
  let step = document.getElementById("step" + currentStep);
  let inputs = step.querySelectorAll("input, textarea");

  for (let inp of inputs) {
    if (inp.value.trim() === "") {
      alert("Please fill this field to continue!");
      return;
    }
  }

  step.classList.add("hidden");
  currentStep++;
  document.getElementById("step" + currentStep).classList.remove("hidden");
}

// BACK
function prevStep() {
  document.getElementById("step" + currentStep).classList.add("hidden");
  currentStep--;
  document.getElementById("step" + currentStep).classList.remove("hidden");
}

// AGE FIX (numbers only, no -)
document.getElementById("age").addEventListener("input", function() {
  this.value = this.value.replace(/[^0-9]/g, "");
});

// SUBMIT (NO SPAM)
document.getElementById("appForm").addEventListener("submit", function(e){
  e.preventDefault();

  if (submitted) return;
  submitted = true;

  let btn = document.querySelector(".next-btn");
  btn.innerText = "Sending...";
  btn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbwNVGOCCfNSEvvsaLC4v2kXu437EFYBCzA8YxMv7OGD_rA3WZMvpBEEvoC0KJJ2ZT56/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name.value,
      age: age.value,
      q1: q1.value,
      q2: q2.value,
      q3: q3.value,
      q4: q4.value,
      q5: q5.value,
      q6: q6.value,
      q7: q7.value,
      q8: q8.value
    })
  }).then(() => {
    alert("Application Sent!");
    location.reload();
  });
});

// CURSOR
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
