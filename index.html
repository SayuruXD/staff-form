<!DOCTYPE html>
<html>
<head>
  <title>Minecone Network Staff Application</title>

  <style>
    body {
      background: linear-gradient(135deg, #1e1e1e, #2f2f2f);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #2b2b2b;
      padding: 25px;
      width: 420px;
      border-radius: 12px;
      position: relative;
      padding-bottom: 70px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      background: #1a1a1a;
      color: white;
    }

    .nav-btn {
      position: absolute;
      bottom: 15px;
      padding: 8px 14px;
      border: none;
      cursor: pointer;
    }

    .next-btn { right: 15px; background: #55ff55; }
    .back-btn { left: 15px; background: #555; }
    .submit-btn { right: 15px; background: #00c3ff; }

    .hidden { display: none; }

    #cursor {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: rgba(85,255,85,0.7);
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<div class="card">
<form id="appForm">

<div class="step" id="step1">
  <input type="text" id="name" placeholder="Minecraft Username" required>
  <input type="text" id="age" placeholder="Age" required inputmode="numeric">
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next</button>
</div>

<div class="step hidden" id="step2">
  <textarea id="q1" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">Back</button>
  <button type="submit" class="nav-btn submit-btn">Submit</button>
</div>

</form>
</div>

<div id="cursor"></div>

<script>
let currentStep = 1;
let submitted = false;

// NAV
function nextStep() {
  let step = document.getElementById("step" + currentStep);
  let inputs = step.querySelectorAll("input, textarea");

  for (let inp of inputs) {
    if (inp.value.trim() === "") {
      alert("Fill the field!");
      return;
    }
  }

  step.classList.add("hidden");
  currentStep++;
  document.getElementById("step" + currentStep).classList.remove("hidden");
}

function prevStep() {
  document.getElementById("step" + currentStep).classList.add("hidden");
  currentStep--;
  document.getElementById("step" + currentStep).classList.remove("hidden");
}

// 🔒 STRICT NUMBERS ONLY
const age = document.getElementById("age");

// block typing letters
age.addEventListener("keypress", e => {
  if (!/[0-9]/.test(e.key)) e.preventDefault();
});

// block paste letters
age.addEventListener("paste", e => {
  const text = (e.clipboardData || window.clipboardData).getData("text");
  if (!/^\d+$/.test(text)) e.preventDefault();
});

// SUBMIT
document.getElementById("appForm").addEventListener("submit", function(e){
  e.preventDefault();

  if (submitted) return;
  submitted = true;

  fetch("https://script.google.com/macros/s/AKfycbwS1h_5rGxwijPZfboqdpS98NFzbxy2zjewerHyqNxRIbQZiGokIdv-5tb-CdZUWeh_/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      age: document.getElementById("age").value,
      q1: document.getElementById("q1").value
    })
  })
  .then(() => {
    alert("Sent!");
    location.reload();
  })
  .catch(() => {
    alert("Error!");
    submitted = false;
  });
});

// CURSOR
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
