<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Staff Application Form</title>
    <style>
        body {
            background-color: #121212; /* Dark theme background */
            color: #e0e0e0; /* Light color for text */
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #4caf50; /* Green styling */
        }
        .step {
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px;
            border: 1px solid #4caf50;
            border-radius: 4px;
            background-color: #2a2a2a;
            color: #e0e0e0;
        }
        button {
            background-color: #4caf50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Staff Application Form</h1>
        <form>
            <div class="step">
                <h2>Step 1: Personal Information</h2>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="step">
                <h2>Step 2: Job Information</h2>
                <label for="position">Position Applied For:</label>
                <input type="text" id="position" name="position" required>
                <label for="experience">Previous Experience:</label>
                <textarea id="experience" name="experience"></textarea>
            </div>
            <div class="step">
                <h2>Step 3: Skills</h2>
                <label for="skills">Skills:</label>
                <input type="text" id="skills" name="skills">
            </div>
            <div class="step">
                <h2>Step 4: Availability</h2>
                <label for="availability">Available Start Date:</label>
                <input type="date" id="availability" name="availability">
            </div>
            <div class="step">
                <h2>Step 5: References</h2>
                <label for="references">References:</label>
                <textarea id="references" name="references"></textarea>
            </div>
            <div class="step">
                <h2>Step 6: Upload Resume</h2>
                <input type="file" id="resume" name="resume">
            </div>
            <div class="step">
                <h2>Step 7: Cover Letter</h2>
                <textarea id="cover_letter" name="cover_letter"></textarea>
            </div>
            <div class="step">
                <h2>Step 8: Additional Information</h2>
                <textarea id="additional_info" name="additional_info"></textarea>
            </div>
            <div class="step">
                <h2>Step 9: Review & Submit</h2>
                <button type="submit">Submit Application</button>
            </div>
        </form>
    </div>
</body>
</html>
