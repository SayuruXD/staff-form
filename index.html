<!DOCTYPE html>
<html>
<head>
  <title>Minecone Network Staff Application</title>

  <style>
    body {
      background: linear-gradient(135deg, #1e1e1e, #2f2f2f);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      background: #2b2b2b;
      padding: 25px;
      width: 420px;
      border-radius: 12px;
      box-shadow: 0 8px 0 #111, 0 0 20px rgba(0,0,0,0.6);
      transform: perspective(800px) rotateX(2deg);
      position: relative;
      padding-bottom: 70px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #55ff55;
      line-height: 1.3;
    }

    /* ✅ TITLE STYLING */
    .title-main {
      font-size: 22px;
      font-weight: bold;
    }

    .title-sub {
      font-size: 16px;
      color: #aaa;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #1a1a1a;
      color: white;
      box-shadow: inset 0 3px 5px #000;
    }

    textarea {
      resize: none;
    }

    input:focus, textarea:focus {
      border: 1px solid #55ff55;
    }

    .nav-btn {
      position: absolute;
      bottom: 15px;
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .next-btn {
      right: 15px;
      background: #55ff55;
      box-shadow: 0 3px 0 #2a8f2a;
    }

    .back-btn {
      left: 15px;
      background: #555;
      box-shadow: 0 3px 0 #222;
    }

    .submit-btn {
      right: 15px;
      background: #00c3ff;
      box-shadow: 0 3px 0 #006a8c;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
    }

    .nav-btn:active {
      transform: translateY(2px);
    }

    .step {
      transition: all 0.3s ease;
    }

    .hidden {
      display: none;
    }

    #cursor {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: rgba(85,255,85,0.7);
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px #55ff55;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div class="card">

<h2>
  <span class="title-main">Minecone Network</span><br>
  <span class="title-sub">Staff Application</span>
</h2>

<form id="appForm">

<div class="step" id="step1">
  <input type="text" id="name" placeholder="Minecraft Username" required>
  <input type="text" id="age" placeholder="Age" required>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step2">
  <textarea id="q1" placeholder="Why do you want to become staff?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step3">
  <textarea id="q2" placeholder="Do you have past admin experience? Explain." required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step4">
  <textarea id="q3" placeholder="How many hours per day or week can you dedicate?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step5">
  <textarea id="q4" placeholder="How would you handle disputes between staff members?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step6">
  <textarea id="q5" placeholder="How would you respond to a serious rule violation by a member?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step7">
  <textarea id="q6" placeholder="Are you familiar with Discord server management and bots?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step8">
  <textarea id="q7" placeholder="How do you ensure fairness and consistency as a leader?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="button" class="nav-btn next-btn" onclick="nextStep()">Next ➜</button>
</div>

<div class="step hidden" id="step9">
  <textarea id="q8" placeholder="Anything else we should know about you?" required></textarea>
  <button type="button" class="nav-btn back-btn" onclick="prevStep()">⬅ Back</button>
  <button type="submit" class="nav-btn submit-btn">Submit 🚀</button>
</div>

</form>
</div>

<div id="cursor"></div>

<script>
let currentStep = 1;
let submitted = false;

function nextStep() {
  let step = document.getElementById("step" + currentStep);
  let inputs = step.querySelectorAll("input, textarea");

  for (let inp of inputs) {
    if (inp.value.trim() === "") {
      alert("Please fill this field to continue!");
      return;
    }
  }

  step.classList.add("hidden");
  currentStep++;
  document.getElementById("step" + currentStep).classList.remove("hidden");
}

function prevStep() {
  document.getElementById("step" + currentStep).classList.add("hidden");
  currentStep--;
  document.getElementById("step" + currentStep).classList.remove("hidden");
}

document.getElementById("age").addEventListener("input", function() {
  this.value = this.value.replace(/[^0-9]/g, "");
});

document.getElementById("appForm").addEventListener("submit", function(e){
  e.preventDefault();

  if (submitted) return;
  submitted = true;

  let btn = document.querySelector(".submit-btn");
  btn.innerText = "Sending...";
  btn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbwS1h_5rGxwijPZfboqdpS98NFzbxy2zjewerHyqNxRIbQZiGokIdv-5tb-CdZUWeh_/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      age: document.getElementById("age").value,
      q1: document.getElementById("q1").value,
      q2: document.getElementById("q2").value,
      q3: document.getElementById("q3").value,
      q4: document.getElementById("q4").value,
      q5: document.getElementById("q5").value,
      q6: document.getElementById("q6").value,
      q7: document.getElementById("q7").value,
      q8: document.getElementById("q8").value
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Application Sent!");
    location.reload();
  })
  .catch(err => {
    alert("Error sending application");
    console.error(err);
    btn.innerText = "Submit 🚀";
    btn.disabled = false;
    submitted = false;
  });
});

// cursor effect (keep this OUTSIDE submit)
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>
  
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
